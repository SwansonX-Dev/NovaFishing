# =====================================================================
#  Environment Jackpots — bonus roll on top of the normal catch
# =====================================================================
# Fires AFTER the normal tier reward is awarded. `chance` is the
# per-catch probability of triggering the jackpot. Entries follow the
# same Reward format as tier entries.
# =====================================================================
jackpots:

  # ----- GLOBAL: Fisher's Jackpot -----
  # Rolls on EVERY catch regardless of biome / rod. Keep `chance` low —
  # this stacks on top of the env-specific pools.
  global:
    chance: 0.01
    broadcast-name: "<gradient:#FFD700:#FF55FF><bold>♛ FISHER'S JACKPOT ♛</bold></gradient>"
    entries:
      # Bulk currency
      - { type: TOKEN, min-amount: 100, max-amount: 500, weight: 40 }
      - { type: MONEY, min-amount: 1000, max-amount: 5000, weight: 30 }
      # XP injection straight into the held rod
      - { type: XP, min-amount: 500, max-amount: 2000, weight: 25 }
      # Useful staples
      - { type: ITEM, material: DIAMOND,            min-amount: 4, max-amount: 12, weight: 25 }
      - { type: ITEM, material: EMERALD,            min-amount: 8, max-amount: 24, weight: 25 }
      - { type: ITEM, material: GOLD_INGOT,         min-amount: 8, max-amount: 24, weight: 20 }
