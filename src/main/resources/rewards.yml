# =====================================================================
#  Catch rewards
# =====================================================================
# Tiers (worst → best):
#   JUNK, COMMON, UNCOMMON, RARE, EPIC, LEGENDARY, MYTHIC
#
# Entry types:
#   ITEM     - vanilla material with optional display data
#   COMMAND  - server-run command(s); <player> = catcher's name
#   MONEY    - Vault economy deposit
#   TOKEN    - Nova Tokens deposit
#   XP       - rod XP injection
#
# weight     - relative odds inside its tier (higher = more common)
# min-amount/max-amount - random stack size for ITEM/MONEY/TOKEN/XP
# permission - optional permission required to roll this entry
#
# Edit live in-game with /novafishing rewards.
# =====================================================================

# Max enchantment level applied to ITEM rewards. Levels in entries above
# this value are clamped down. Vanilla caps display nicely up to 10;
# Bukkit allows up to 32767 with unsafe enchants.
max-enchant-level: 10

