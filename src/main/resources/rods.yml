# =====================================================================
#  Ability descriptions (used in GUIs)
# =====================================================================
abilities:
  LAVA_RESISTANT:
    name: "<red>Lava Resistant"
    description: "<gray>Rod doesn't burn up in lava."
  MAGNET:
    name: "<aqua>Magnet"
    description: "<gray>Catches travel directly to your inventory."
  DOUBLE_CATCH:
    name: "<green>Double Catch"
    description: "<gray>10% chance to reel in two items."
    chance: 0.10
  TRIPLE_CATCH:
    name: "<gold>Triple Catch"
    description: "<gray>5% chance for THREE items."
    chance: 0.05
  AUTO_REEL:
    name: "<yellow>Auto-Reel"
    description: "<gray>Automatically reels when a fish bites."
  XP_BOOST_I:
    name: "<light_purple>XP Boost I"
    description: "<gray>+25% rod XP."
    multiplier: 1.25
  XP_BOOST_II:
    name: "<light_purple>XP Boost II"
    description: "<gray>+50% rod XP."
    multiplier: 1.50
  XP_BOOST_III:
    name: "<light_purple>XP Boost III"
    description: "<gray>+100% rod XP."
    multiplier: 2.00
  TREASURE_HUNTER_I:
    name: "<gold>Treasure Hunter I"
    description: "<gray>+5% chance to upgrade catch tier."
    chance: 0.05
  TREASURE_HUNTER_II:
    name: "<gold>Treasure Hunter II"
    description: "<gray>+10% chance to upgrade catch tier."
    chance: 0.10
  TREASURE_HUNTER_III:
    name: "<gold>Treasure Hunter III"
    description: "<gray>+20% chance to upgrade catch tier."
    chance: 0.20
  LUCKY_HOOK:
    name: "<green>Lucky Hook"
    description: "<gray>Halves bite wait time."
    multiplier: 0.5
  VOID_WALKER:
    name: "<dark_purple>Void Walker"
    description: "<gray>You can fish in configured void regions."
  PHOENIX_REEL:
    name: "<red>Phoenix Reel"
    description: "<gray>Catches in lava set the item on fire (+25% value)."
    multiplier: 1.25
  MYTHIC_FORTUNE:
    name: "<gradient:#FFD700:#FF3300>Mythic Fortune</gradient>"
    description: "<gray>Doubles Mythic tier weight."
    multiplier: 2.0
  ETERNAL_FLAME:
    name: "<gradient:#FF3300:#FFAA00>Eternal Flame</gradient>"
    description: "<gray>All XP gain doubled."
    multiplier: 2.0
  ASCENDED:
    name: "<gradient:#FFFFFF:#FFD700><bold>Ascended</bold></gradient>"
    description: "<gray>25% chance to upgrade a catch one tier (stacks with Treasure Hunter)."
    chance: 0.25
  WEALTH_MAGNET:
    name: "<gold>Wealth Magnet"
    description: "<gray>All Nova Token rewards are doubled."
    multiplier: 2.0
  EXPERIENCE_AMP:
    name: "<aqua>Experience Amp"
    description: "<gray>Catches drop 5-20 vanilla XP orbs."
  LIGHTNING_ROD:
    name: "<yellow>Lightning Rod"
    description: "<gray>Mythic catches summon visual lightning."
  AUTO_SMELT:
    name: "<red>Auto-Smelt"
    description: "<gray>Raw fish are delivered cooked."

