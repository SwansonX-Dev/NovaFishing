# =====================================================================
#  Rod definitions
# =====================================================================
# A rod is a tier of fishing pole. Each rod has its OWN level curve.
# Players grind XP per-rod; abilities unlock at specific levels.
# Max levels are intentionally high so this is a WEEKS-long grind.
#
# Level XP formula (per rod):
#   xp(level) = base * level^exponent
#
# Catch weight multipliers map: higher = better odds on rarer rewards.
# =====================================================================

rods:
  # ------------- Starter rod, water only, modest XP ----------------
  wooden:
    display-name: "<gray>Wooden Rod"
    material: FISHING_ROD
    custom-model-data: 1001
    max-level: 25
    base-xp: 25
    xp-exponent: 1.55
    # Vanilla Minecraft XP granted per successful cast (omit or 0 for none).
    vanilla-xp-per-cast: 1
    upgrade-to: iron
    upgrade-cost: 100
    skins:
      driftwood:
        display-name: "<gray>Driftwood Rod"
        custom-model-data: 1010
